---
layout: default
title: Viashino Scrolls
---

<main class="post-shell">
  <nav class="post-nav" aria-label="Breadcrumb">
    <a class="post-nav__mark-link" href="{{ '/' | relative_url }}" aria-label="Home">
      <img class="post-nav__mark" src="{{ '/images/retromancer-mini.jpg' | relative_url }}" alt="">
    </a>
    <ol class="post-nav__breadcrumb">
      <li><a href="{{ '/' | relative_url }}">Home</a></li>
      <li aria-hidden="true">&gt;</li>
      <li><a aria-current="page" href="{{ '/blog/' | relative_url }}">Blog</a></li>
    </ol>
  </nav>

  <section class="blog-index">
    <header class="post-hero">
      <p class="post-kicker">Retromancers blog</p>
      <h1>Viashino Scrolls</h1>
    </header>

    <div class="blog-list">
      {% for post in site.posts %}
        <article class="blog-item">
          <p class="post-meta">
            <time datetime="{{ post.date | date_to_xmlschema }}">{{ post.date | date: "%B %-d, %Y" }}</time>
          </p>
          <h2><a href="{{ post.url }}">{{ post.title }}</a></h2>
          {% if post.excerpt %}
            <p>{{ post.excerpt | strip_html | truncatewords: 34 }}</p>
          {% endif %}
        </article>
      {% endfor %}
    </div>
  </section>
</main>
