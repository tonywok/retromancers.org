---
layout: default
---

<main class="post-shell">
  <nav class="post-nav" aria-label="Site navigation">
    <a class="post-nav__brand" href="/blog/">
      <img class="post-nav__mark" src="/images/retromancer-mini.jpg" alt="">
      <span>Viashino Scrolls</span>
    </a>
  </nav>

  <article class="post">
    <header class="post-hero">
      <p class="post-kicker">Columbus, Ohio Premodern</p>
      <h1>{{ page.title }}</h1>
      <p class="post-meta">
        {% if page.author %}{{ page.author }}{% endif %}
        {% if page.author and page.date %}<span aria-hidden="true">/</span>{% endif %}
        {% if page.date %}<time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%B %-d, %Y" }}</time>{% endif %}
      </p>
    </header>

    <div class="post-content">
      {{ content }}
    </div>
  </article>
</main>
